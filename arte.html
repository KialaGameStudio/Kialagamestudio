        .site-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.75) 100%);
            z-index: 1;
            pointer-events: none;
        }

        .content-wrapper {
            position: relative;
            z-index: 2;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* ─── NAVEGAÇÃO LIMPA ─── */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-container {
            max-width: 1360px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .brand-icon {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, var(--orange), var(--cyan));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
            color: #111;
        }

        .brand-text-accent {
            background: linear-gradient(135deg, #ffffff 30%, var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ─── CONSTRUCTION SHOWCASE ─── */
        .construction-showcase {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 160px 24px 100px;
        }

        .construction-card {
            background: rgba(15, 21, 35, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 2px solid var(--cyan);
            border-radius: 28px;
            padding: 64px 80px;
            text-align: center;
            max-width: 650px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8), 0 0 40px rgba(0, 210, 255, 0.25);
            animation: floatCard 6s ease-in-out infinite;
        }

        @keyframes floatCard {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .construction-card h1 {
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--orange), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }

        .construction-card p {
            color: #cbd5e1;
            font-size: 1.35rem;
            line-height: 1.6;
            font-weight: 500;
            margin-bottom: 40px;
        }

        .btn-back-home {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--cyan);
            color: #ffffff;
            padding: 16px 36px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 1.15rem;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 25px var(--cyan-glow);
            transition: all 0.3s ease;
        }

        .btn-back-home:hover {
            background: #00bfff;
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(0, 210, 255, 0.6);
        }

        /* ─── SIGA-NOS NO RODAPÉ ─── */
        .follow-us-strip { padding: 60px 24px; max-width: 1360px; margin: 0 auto; text-align: center; border-top: 1px solid rgba(255, 255, 255, 0.08); width: 100%; }
        .follow-us-strip h4 { font-size: 1.6rem; font-weight: 900; color: #ffffff; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 24px; }
        .social-icons-bottom { display: flex; justify-content: center; align-items: center; gap: 32px; }

        .btn-bottom-icon-only { width: 76px; height: 76px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #ffffff; transition: all 0.3s ease; text-decoration: none; border: 2px solid var(--border-hover); background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); cursor: pointer; }
        .fb-icon-only { color: #5097ff; border-color: rgba(24, 119, 242, 0.4); } .fb-icon-only:hover { background-color: var(--fb-blue); color: #ffffff; box-shadow: 0 12px 40px rgba(24, 119, 242, 0.6); transform: scale(1.12); }
        .yt-icon-only { color: #ff4a4a; border-color: rgba(255, 0, 0, 0.4); } .yt-icon-only:hover { background-color: var(--yt-red); color: #ffffff; box-shadow: 0 12px 40px rgba(255, 0, 0, 0.6); transform: scale(1.12); }
        .itch-icon-only { color: #ff2449; border-color: rgba(255, 36, 73, 0.4); } .itch-icon-only:hover { background-color: #ff2449; color: #ffffff; box-shadow: 0 12px 40px rgba(255, 36, 73, 0.6); transform: scale(1.12); }

        /* ─── FOOTER ─── */
        footer { background: #000000; padding: 40px 24px 60px; text-align: center; width: 100%; }
        .footer-bottom { max-width: 1360px; margin: 0 auto; border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 36px; color: rgba(255, 255, 255, 0.4); font-size: 1rem; }

        @media (max-width: 768px) {
            .construction-card { padding: 48px 36px; }
            .construction-card h1 { font-size: 2.5rem; }
        }
    </style>
</head>
